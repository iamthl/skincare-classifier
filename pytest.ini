[pytest]
# Discoverable test layout: tests live in tests/, src/ is on the path
# via the conftest below. Strict markers prevent typos masking as
# silently-skipped tests.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
filterwarnings =
    error
